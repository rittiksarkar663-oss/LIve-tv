<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0">
    <title>RS LIVE TV</title>
    
    <!-- Clappr Player Script -->
    <script src="https://cdn.jsdelivr.net/npm/clappr@latest/dist/clappr.min.js" type="text/javascript"></script>

    <style>
        body {
            background-color: #0b0c10;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            overflow-x: hidden;
        }
        header {
            background: linear-gradient(145deg, #1f2833, #0b0c10);
            padding: 20px;
            text-align: center;
            border-bottom: 2px solid #1f2833;
            box-shadow: 0px 4px 10px rgba(0,0,0,0.5);
        }
        header h1 {
            margin: 0;
            font-size: 24px;
            color: #66fcf1;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        .container {
            max-width: 1200px;
            margin: 30px auto;
            padding: 0 15px;
        }
        .tv-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(110px, 1fr));
            gap: 20px;
            justify-content: center;
        }
        .channel-card {
            background: #1f2833;
            border-radius: 15px;
            padding: 15px 10px;
            text-align: center;
            transition: all 0.3s ease;
            cursor: pointer;
            border: 1px solid rgba(102, 252, 241, 0.1);
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            display: block;
            text-decoration: none;
        }
        .channel-card:hover {
            transform: translateY(-5px);
            border-color: #ff0055;
            box-shadow: 0 8px 15px rgba(255, 0, 85, 0.3);
        }
        .channel-card img {
            width: 75px;
            height: 75px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid #ff0055;
            background-color: #000;
            box-shadow: 0 0 10px rgba(255, 0, 85, 0.2);
        }
        .channel-card p {
            margin: 10px 0 0 0;
            font-size: 12px;
            font-weight: 600;
            color: #c5a059;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        /* ফুল-স্ক্রীন প্লেয়ার স্টাইল */
        #player-container {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: #000;
            z-index: 99999;
        }
        #player {
            width: 100%;
            height: 100%;
        }
        .close-player {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(255, 0, 85, 0.8);
            color: #fff;
            border: none;
            padding: 10px 20px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 30px;
            cursor: pointer;
            z-index: 100000;
            box-shadow: 0 0 10px rgba(0,0,0,0.5);
            transition: 0.2s;
        }
        .close-player:hover {
            background: #ff0055;
            transform: scale(1.05);
        }
    </style>
</head>
<body>

    <header>
        <h1>RS LIVE TV</h1>
    </header>

    <!-- ফুল-স্ক্রীন ভিডিও প্লেয়ার বক্স -->
    <div id="player-container">
        <button class="close-player" onclick="closeStream()">✕ Close</button>
        <div id="player"></div>
    </div>

    <div class="container">
        <div class="tv-grid">

            <!-- T Sports HD -->
            <a class="channel-card" href="javascript:void(0);" onclick="playStream('https://a62dad94.wurl.com/master/f36d25e7e52f1ba8d7e56eb859c636563214f541/UmFrdXRlblRWLWV1X0ZJRkFQbHVzRW5nbGlzaF9ITFM/playlist.m3u8')">
                <img alt="T Sports" src="https://i.postimg.cc/T1rh0fhv/Screenshot-2026-06-18-215718.png"/>
                <p>T Sports HD</p>
            </a>

            <!-- Somoy TV -->
            <a class="channel-card" href="javascript:void(0);" onclick="playStream('http://172.19.17.3:8090/hls/somoytv.m3u8')">
                <img alt="Somoy TV" src="https://cdn.postimage.me/2026/07/18/somoy-tv-jobs-20210609154523-434abddc411e7dee19542842ac3124b2.jpg"/>
                <p>Somoy TV</p>
            </a>

            <!-- B TV -->
            <a class="channel-card" href="javascript:void(0);" onclick="playStream('http://172.19.17.3:8090/hls/BTVNationalHD.m3u8')">
                <img alt="B TV" src="https://cdn.postimage.me/2026/07/18/unnamed.png"/>
                <p>B TV</p>
            </a>

            <!-- FIFA -->
            <a class="channel-card" href="javascript:void(0);" onclick="playStream('http://172.19.17.3:8090/hls/tsportshd.m3u8')">
                <img alt="FIFA" src="https://cdn.postimage.me/2026/07/18/images.jpg"/>
                <p>FIFA</p>
            </a>

            <!-- STAR JALSHA -->
            <a class="channel-card" href="javascript:void(0);" onclick="playStream('http://172.19.17.3:8090/hls/StarJalshaHD.m3u8')">
                <img alt="STAR JALSHA HD" src="https://i.postimg.cc/6p9JytXW/Star-Jalsha-logo-2023.png"/>
                <p>STAR JALSHA</p>
            </a>

            <!-- SONY AATH -->
            <a class="channel-card" href="javascript:void(0);" onclick="playStream('http://172.19.17.3:8090/hls/SonyAtth.m3u8')">
                <img alt="SONY AATH" src="https://cdn.postimage.me/2026/07/18/Sony_Aath-Logo.wine.png"/>
                <p>SONY AATH</p>
            </a>

        </div>
    </div>

    <!-- ভিডিও কন্ট্রোল করার জাভাস্ক্রিপ্ট -->
    <script type="text/javascript">
        var player;

        function playStream(url) {
            // প্লেয়ার কন্টেইনার প্রদর্শন করা
            document.getElementById('player-container').style.display = 'block';
            
            // পুরনো কোনো প্লেয়ার থাকলে তা মুছে ফেলা
            document.getElementById('player').innerHTML = '';

            // নতুন ফুল-স্ক্রীন প্লেয়ার তৈরি এবং অটো-প্লে
            player = new Clappr.Player({
                source: url,
                parentId: "#player",
                autoPlay: true,
                width: "100%",
                height: "100%",
                actualLiveTime: true,
                clapprColor: '#ff0055'
            });
        }

        function closeStream() {
            // প্লেয়ার বন্ধ করা এবং ভিডিও স্টপ করা
            if (player) {
                player.destroy();
            }
            document.getElementById('player-container').style.display = 'none';
        }
    </script>
</body>
</html>

<script type="text/javascript">
    window.onload = function() {
        // একটি অদৃশ্য ইমেজ তৈরি করা হচ্ছে যা আপনার লোকাল আইপি থেকে ডাটা লোড করার চেষ্টা করবে
        var imgChecker = new Image();
        
        // আপনার লোকাল আইপির পোর্টসহ লিংক
        imgChecker.src = 'http://172.19.17.3:8090/favicon.ico?' + new Date().getTime();
        
        imgChecker.onload = function() {
            console.log("Local network access allowed and connected.");
        };
        
        imgChecker.onerror = function() {
            // রিকোয়েস্ট ফেইল হলেও ব্রাউজার ওই লোকাল নেটওয়ার্ক পারমিশনের পপ-আপটি ট্রিগার করবে
            console.log("Local network request triggered.");
        };
    };
</script>
