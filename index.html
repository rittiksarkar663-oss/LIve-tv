<b:skin><![CDATA[
/*-----------------------------------------------
Blogger Live TV Grid Theme
Designed for RS LIVE TV
-----------------------------------------------*/
body {
  background-color: #0b0c10;
  color: #ffffff;
  font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  margin: 0;
  padding: 0;
}
header {
  background: linear-gradient(145deg, #1f2833, #0b0c10);
  padding: 20px;
  text-align: center;
  border-bottom: 2px solid #1f2833;
  box-shadow: 0px 4px 10px rgba(0,0,0,0.5);
}
header h1 {
  margin: 0;
  font-size: 24px;
  color: #66fcf1;
  text-transform: uppercase;
  letter-spacing: 2px;
}
.container {
  max-width: 1200px;
  margin: 30px auto;
  padding: 0 15px;
}
.tv-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(110px, 1fr));
  gap: 20px;
  justify-content: center;
}
.channel-card {
  background: #1f2833;
  border-radius: 15px;
  padding: 15px 10px;
  text-align: center;
  transition: all 0.3s ease;
  cursor: pointer;
  border: 1px solid rgba(102, 252, 241, 0.1);
  box-shadow: 0 4px 6px rgba(0,0,0,0.3);
  display: block;
  text-decoration: none;
}
.channel-card:hover {
  transform: translateY(-5px);
  border-color: #ff0055;
  box-shadow: 0 8px 15px rgba(255, 0, 85, 0.3);
}
.channel-card img {
  width: 75px;
  height: 75px;
  border-radius: 50%;
  object-fit: cover;
  border: 3px solid #ff0055;
  background-color: #000;
  box-shadow: 0 0 10px rgba(255, 0, 85, 0.2);
}
.channel-card p {
  margin: 10px 0 0 0;
  font-size: 12px;
  font-weight: 600;
  color: #c5a059;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

/* ফুল-স্ক্রীন প্লেয়ার স্টাইল */
#player-container {
  display: none;
  position: fixed;
  top: 0;
  left: 0;
  width: 100vw;
  height: 100vh;
  background: #000;
  z-index: 99999;
}
#player {
  width: 100%;
  height: 100%;
}
.close-player {
  position: absolute;
  top: 20px;
  right: 20px;
  background: rgba(255, 0, 85, 0.8);
  color: #fff;
  border: none;
  padding: 10px 20px;
  font-size: 16px;
  font-weight: bold;
  border-radius: 30px;
  cursor: pointer;
  z-index: 100000;
  box-shadow: 0 0 10px rgba(0,0,0,0.5);
  transition: 0.2s;
}
.close-player:hover {
  background: #ff0055;
  transform: scale(1.05);
}
]]></b:skin>

  <!-- ভ&#2495;ড&#2495;ও কন&#2509;ট&#2509;র&#2507;ল কর&#2494;র জ&#2494;ভ&#2494;স&#2509;ক&#2509;র&#2495;প&#2509;ট -->
  <script type='text/javascript'>
    var player;

    function playStream(url) {
      // প&#2509;ল&#2503;য়&#2494;র কন&#2509;ট&#2503;ইন&#2494;র প&#2509;রদর&#2509;শন কর&#2494;
      document.getElementById(&#39;player-container&#39;).style.display = &#39;block&#39;;
      
      // প&#2497;র&#2507;ন&#2507; ক&#2507;ন&#2507; প&#2509;ল&#2503;য়&#2494;র থ&#2494;কল&#2503; ত&#2494; ম&#2497;ছ&#2503; ফ&#2503;ল&#2494;
      document.getElementById(&#39;player&#39;).innerHTML = &#39;&#39;;

      // নত&#2497;ন ফ&#2497;ল-স&#2509;ক&#2509;র&#2496;ন প&#2509;ল&#2503;য়&#2494;র ত&#2504;র&#2495; এব&#2434; অট&#2507;-প&#2509;ল&#2503;
      player = new Clappr.Player({
        source: url,
        parentId: &quot;#player&quot;,
        autoPlay: true,
        width: &quot;100%&quot;,
        height: &quot;100%&quot;,
        height: &#39;100%&#39;,
        actualLiveTime: true,
        clapprColor: &#39;#ff0055&#39;
      });
    }

    function closeStream() {
      // প&#2509;ল&#2503;য়&#2494;র বন&#2509;ধ কর&#2494; এব&#2434; ভ&#2495;ড&#2495;ও স&#2509;টপ কর&#2494;
      if (player) {
        player.destroy();
      }
      document.getElementById(&#39;player-container&#39;).style.display = &#39;none&#39;;
    }
  </script>

        <b:includable id='threaded_comment_js' var='post'>
  <script async='async' expr:src='data:post.commentSrc' type='text/javascript'/>

  <script type='text/javascript'>
    (function() {
      var items = <data:post.commentJso/>;
      var msgs = <data:post.commentMsgs/>;
      var config = <data:post.commentConfig/>;

// <![CDATA[
      var cursor = null;
      if (items && items.length > 0) {
        cursor = parseInt(items[items.length - 1].timestamp) + 1;
      }

      var bodyFromEntry = function(entry) {
        var text = (entry &&
                    ((entry.content && entry.content.$t) ||
                     (entry.summary && entry.summary.$t))) ||
            '';
        if (entry && entry.gd$extendedProperty) {
          for (var k in entry.gd$extendedProperty) {
            if (entry.gd$extendedProperty[k].name == 'blogger.contentRemoved') {
              return '<span class="deleted-comment">' + text + '</span>';
            }
          }
        }
        return text;
      }

      var parse = function(data) {
        cursor = null;
        var comments = [];
        if (data && data.feed && data.feed.entry) {
          for (var i = 0, entry; entry = data.feed.entry[i]; i++) {
            var comment = {};
            // comment ID, parsed out of the original id format
            var id = /blog-(\d+).post-(\d+)/.exec(entry.id.$t);
            comment.id = id ? id[2] : null;
            comment.body = bodyFromEntry(entry);
            comment.timestamp = Date.parse(entry.published.$t) + '';
            if (entry.author && entry.author.constructor === Array) {
              var auth = entry.author[0];
              if (auth) {
                comment.author = {
                  name: (auth.name ? auth.name.$t : undefined),
                  profileUrl: (auth.uri ? auth.uri.$t : undefined),
                  avatarUrl: (auth.gd$image ? auth.gd$image.src : undefined)
                };
              }
            }
            if (entry.link) {
              if (entry.link[2]) {
                comment.link = comment.permalink = entry.link[2].href;
              }
              if (entry.link[3]) {
                var pid = /.*comments\/default\/(\d+)\?.*/.exec(entry.link[3].href);
                if (pid && pid[1]) {
                  comment.parentId = pid[1];
                }
              }
            }
            comment.deleteclass = 'item-control blog-admin';
            if (entry.gd$extendedProperty) {
              for (var k in entry.gd$extendedProperty) {
                if (entry.gd$extendedProperty[k].name == 'blogger.itemClass') {
                  comment.deleteclass += ' ' + entry.gd$extendedProperty[k].value;
                } else if (entry.gd$extendedProperty[k].name == 'blogger.displayTime') {
                  comment.displayTime = entry.gd$extendedProperty[k].value;
                }
              }
            }
            comments.push(comment);
          }
        }
        return comments;
      };

      var paginator = function(callback) {
        if (hasMore()) {
          var url = config.feed + '?alt=json&v=2&orderby=published&reverse=false&max-results=50';
          if (cursor) {
            url += '&published-min=' + new Date(cursor).toISOString();
          }
          window.bloggercomments = function(data) {
            var parsed = parse(data);
            cursor = parsed.length < 50 ? null
                : parseInt(parsed[parsed.length - 1].timestamp) + 1
            callback(parsed);
            window.bloggercomments = null;
          }
          url += '&callback=bloggercomments';
          var script = document.createElement('script');
          script.type = 'text/javascript';
          script.src = url;
          document.getElementsByTagName('head')[0].appendChild(script);
        }
      };
      var hasMore = function() {
        return !!cursor;
      };
      var getMeta = function(key, comment) {
        if ('iswriter' == key) {
          var matches = !!comment.author
              && comment.author.name == config.authorName
              && comment.author.profileUrl == config.authorUrl;
          return matches ? 'true' : '';
        } else if ('deletelink' == key) {
          return config.baseUri + '/comment/delete/'
               + config.blogId + '/' + comment.id;
        } else if ('deleteclass' == key) {
          return comment.deleteclass;
        }
        return '';
      };

      var replybox = null;
      var replyUrlParts = null;
      var replyParent = undefined;

      var onReply = function(commentId, domId) {
        if (replybox == null) {
          // lazily cache replybox, and adjust to suit this style:
          replybox = document.getElementById('comment-editor');
          if (replybox != null) {
            replybox.height = '250px';
            replybox.style.display = 'block';
            replyUrlParts = replybox.src.split('#');
          }
        }
        if (replybox && (commentId !== replyParent)) {
          replybox.src = '';
          document.getElementById(domId).insertBefore(replybox, null);
          replybox.src = replyUrlParts[0]
              + (commentId ? '&parentID=' + commentId : '')
              + '#' + replyUrlParts[1];
          replyParent = commentId;
        }
      };

      var hash = (window.location.hash || '#').substring(1);
      var startThread, targetComment;
      if (/^comment-form_/.test(hash)) {
        startThread = hash.substring('comment-form_'.length);
      } else if (/^c[0-9]+$/.test(hash)) {
        targetComment = hash.substring(1);
      }

      // Configure commenting API:
      var configJso = {
        'maxDepth': config.maxThreadDepth
      };
      var provider = {
        'id': config.postId,
        'data': items,
        'loadNext': paginator,
        'hasMore': hasMore,
        'getMeta': getMeta,
        'onReply': onReply,
        'rendered': true,
        'initComment': targetComment,
        'initReplyThread': startThread,
        'config': configJso,
        'messages': msgs
      };

      var render = function() {
        if (window.goog && window.goog.comments) {
          var holder = document.getElementById('comment-holder');
          window.goog.comments.render(holder, provider);
        }
      };

      // render now, or queue to render when library loads:
      if (window.goog && window.goog.comments) {
        render();
      } else {
        window.goog = window.goog || {};
        window.goog.comments = window.goog.comments || {};
        window.goog.comments.loadQueue = window.goog.comments.loadQueue || [];
        window.goog.comments.loadQueue.push(render);
      }
    })();
// ]]>
  </script>
